<!doctype html><html><head><meta charset="utf-8"><title>Polaroid</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 240px; background: #FAFAF7;">
  <div class="label">Polaroid portrait — hero illustration frame</div>
  <div style="display: flex; gap: 16px; margin-top: 16px; align-items: flex-start;">
    <div style="width: 160px; height: 160px; background: linear-gradient(180deg, #040404, #282A49); border: 8px solid white; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; transform: rotate(-2deg);">
      <img src="../assets/sparkler.svg" style="width: 100px; opacity: .9;">
    </div>
    <div style="width: 160px; height: 160px; background: #D9D9D9 url('../assets/image-b.jpg') center/cover; border: 8px solid white; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.2); transform: rotate(1.5deg);"></div>
    <div style="width: 160px; height: 160px; background: #D9D9D9 url('../assets/image-e.jpg') center/cover; border: 8px solid white; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.2); transform: rotate(-1deg);"></div>
  </div>
</div>
</body></html>
