<!doctype html><html><head><meta charset="utf-8"><title>Sparkler burst palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 200px;">
  <div class="label" style="margin-bottom: 10px;">Sparkler burst — decorative accents (use in clusters, never solo)</div>
  <div class="grid" style="grid-template-columns: repeat(6, 1fr);">
    <div class="swatch" style="background: #FEB545"><span class="name">amber</span><span class="hex">#FEB545</span></div>
    <div class="swatch" style="background: #FFEC5D"><span class="name">sun</span><span class="hex">#FFEC5D</span></div>
    <div class="swatch" style="background: #FFDEAB"><span class="name">peach</span><span class="hex">#FFDEAB</span></div>
    <div class="swatch" style="background: #BCEAFF"><span class="name">sky</span><span class="hex">#BCEAFF</span></div>
    <div class="swatch" style="background: #48C0F7"><span class="name">cyan</span><span class="hex">#48C0F7</span></div>
    <div class="swatch" style="background: #48CFC3"><span class="name">teal</span><span class="hex">#48CFC3</span></div>
  </div>
  <div class="grid" style="grid-template-columns: repeat(6, 1fr); margin-top:8px;">
    <div class="swatch" style="background: #DE5FCA; color:white"><span class="name">pink</span><span class="hex">#DE5FCA</span></div>
    <div class="swatch dark" style="background: #2B2E94"><span class="name">indigo-ink</span><span class="hex">#2B2E94</span></div>
    <div style="grid-column: span 4; display: flex; align-items: center; padding: 8px 12px; color: var(--fg-muted); font-size: 11px; font-family: var(--font-mono);">
      Used exclusively on the sparkler motif. Never as UI colour.
    </div>
  </div>
</div>
</body></html>
