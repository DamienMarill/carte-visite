<!doctype html><html><head><meta charset="utf-8"><title>Project card</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 240px; background: #F5F5F5;">
  <div class="label">Project card · paper</div>
  <div style="display: flex; gap: 16px; margin-top: 14px;">
    <div style="background: white; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06); padding: 16px; width: 300px;">
      <div style="width: 100%; height: 110px; background: linear-gradient(135deg, #5A4DEB, #A49CFF); border-radius: 2px;"></div>
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 20px; margin-top: 12px; color: #1E1E1E;">Atelier compote</div>
      <div style="font-size: 13px; color: #8C8C8C; margin-top: 4px;">Outil interne · 2025</div>
    </div>
    <div style="background: white; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06); padding: 16px; width: 300px; transform: translateY(-2px);">
      <div style="width: 100%; height: 110px; background: #1E1E1E url('../assets/spark-small.svg') center/60% no-repeat; border-radius: 2px;"></div>
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 20px; margin-top: 12px; color: #1E1E1E;">Nuit étincelle <span style="color:#5A4DEB;">↗</span></div>
      <div style="font-size: 13px; color: #8C8C8C; margin-top: 4px;">Site vitrine · hover state</div>
    </div>
  </div>
</div>
</body></html>
