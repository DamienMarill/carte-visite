<!doctype html><html><head><meta charset="utf-8"><title>Signature accent</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 200px;">
  <div class="label" style="margin-bottom: 10px;">Signature — violet</div>
  <div class="grid" style="grid-template-columns: 2fr 1fr 1fr;">
    <div class="swatch dark" style="background: #5A4DEB; min-height: 120px;">
      <div style="font-family: var(--font-body); font-size: 16px; font-weight: 600; margin-bottom: 4px;">violet · primary accent</div>
      <span class="hex">#5A4DEB · rgb(90,77,235)</span>
    </div>
    <div class="swatch" style="background: #A49CFF; color:#1E1E1E; min-height:120px;"><span class="name">violet-soft</span><span class="hex">#A49CFF</span></div>
    <div class="swatch" style="background: #A973FC; color:white; min-height:120px;"><span class="name">violet-pale</span><span class="hex">#A973FC</span></div>
  </div>
  <div style="margin-top: 10px; color: var(--fg-muted); font-size: 11px;">One violet moment per screen. Pairs with pure white & deep ink only.</div>
</div>
</body></html>
