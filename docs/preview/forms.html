<!doctype html><html><head><meta charset="utf-8"><title>Forms</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 220px;">
  <div class="label">Form fields</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; max-width: 600px;">
    <div>
      <label style="display:block; font-size:12px; font-weight:500; color:#525252; margin-bottom:6px;">Votre nom</label>
      <input placeholder="Claire Dupont" style="width:100%; padding: 12px 14px; border-radius: 8px; border:1.5px solid #D9D9D9; font-family: var(--font-body); font-size: 15px; background: white; box-sizing: border-box;">
    </div>
    <div>
      <label style="display:block; font-size:12px; font-weight:500; color:#525252; margin-bottom:6px;">Email</label>
      <input placeholder="claire@atelier.fr" style="width:100%; padding: 12px 14px; border-radius: 8px; border:1.5px solid #5A4DEB; font-family: var(--font-body); font-size: 15px; background: white; box-sizing: border-box; outline: none; box-shadow: 0 0 0 4px rgba(90,77,235,.15);">
    </div>
    <div style="grid-column: span 2;">
      <label style="display:block; font-size:12px; font-weight:500; color:#525252; margin-bottom:6px;">Parlez-moi de votre projet</label>
      <textarea rows="2" placeholder="Une idée, un problème, une envie…" style="width:100%; padding: 12px 14px; border-radius: 8px; border:1.5px solid #D9D9D9; font-family: var(--font-body); font-size: 15px; resize: none; box-sizing: border-box;"></textarea>
    </div>
  </div>
  <div class="label" style="margin-top: 10px;">default · focus (violet ring) · textarea</div>
</div>
</body></html>
