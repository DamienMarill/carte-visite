<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 200px;">
  <div class="label">Buttons</div>
  <div style="display: flex; flex-direction: column; gap: 14px; margin-top: 14px;">
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="btn btn-primary">Prendre contact</button>
      <button class="btn btn-primary" style="box-shadow: 0 0 0 6px rgba(90,77,235,.18); background: #4a3fd4;">Prendre contact</button>
      <span class="label" style="margin-left: 8px;">primary · hover</span>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="btn btn-secondary">Voir le CV</button>
      <button class="btn btn-secondary" style="background: #1E1E1E; color: white;">Voir le CV</button>
      <span class="label" style="margin-left: 8px;">secondary · hover</span>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <a class="btn btn-ghost" href="#">Projets</a>
      <a class="btn btn-ghost" href="#" style="text-decoration-thickness: 2px; text-underline-offset: 5px;">Projets</a>
      <span class="label" style="margin-left: 8px;">text-link · hover (underline thickens)</span>
    </div>
  </div>
</div>
</body></html>
