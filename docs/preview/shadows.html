<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 220px; background: #F5F5F5;">
  <div class="label">Elevation</div>
  <div style="display: flex; gap: 20px; margin-top: 24px; align-items: flex-start;">
    <div style="text-align: center;">
      <div style="width: 150px; height: 100px; background: white; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.05);"></div>
      <div class="label" style="margin-top: 10px;">shadow-sm</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 150px; height: 100px; background: white; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);"></div>
      <div class="label" style="margin-top: 10px;">shadow-md · default card</div>
    </div>
    <div style="text-align: center;">
      <div style="width: 150px; height: 100px; background: white; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06);"></div>
      <div class="label" style="margin-top: 10px;">shadow-lg · hover</div>
    </div>
  </div>
</div>
</body></html>
