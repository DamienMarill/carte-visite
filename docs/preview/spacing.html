<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 180px;">
  <div class="label">Spacing — 4px base</div>
  <div style="display: flex; align-items: flex-end; gap: 12px; margin-top: 14px; height: 100px;">
    <div style="width: 4px; height: 4px; background: #5A4DEB;"></div>
    <div style="width: 8px; height: 8px; background: #5A4DEB;"></div>
    <div style="width: 12px; height: 12px; background: #5A4DEB;"></div>
    <div style="width: 16px; height: 16px; background: #5A4DEB;"></div>
    <div style="width: 24px; height: 24px; background: #5A4DEB;"></div>
    <div style="width: 32px; height: 32px; background: #5A4DEB;"></div>
    <div style="width: 48px; height: 48px; background: #5A4DEB;"></div>
    <div style="width: 64px; height: 64px; background: #5A4DEB;"></div>
    <div style="width: 96px; height: 96px; background: #5A4DEB;"></div>
  </div>
  <div style="display: flex; gap: 12px; margin-top: 8px; font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle);">
    <span style="width:4px">1</span><span style="width:8px">2</span><span style="width:12px">3</span><span style="width:16px">4</span><span style="width:24px">5</span><span style="width:32px">6</span><span style="width:48px">7</span><span style="width:64px">8</span><span style="width:96px">9</span>
  </div>
</div>
</body></html>
