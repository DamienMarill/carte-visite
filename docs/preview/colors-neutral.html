<!doctype html><html><head><meta charset="utf-8"><title>Core neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="height: 200px;">
  <div class="label" style="margin-bottom: 10px;">Core / neutral</div>
  <div class="grid" style="grid-template-columns: repeat(7, 1fr);">
    <div class="swatch dark" style="background: #040404"><span class="name">black</span><span class="hex">#040404</span></div>
    <div class="swatch dark" style="background: #282A49"><span class="name">midnight</span><span class="hex">#282A49</span></div>
    <div class="swatch dark" style="background: #1E1E1E"><span class="name">ink</span><span class="hex">#1E1E1E</span></div>
    <div class="swatch" style="background: #8C8C8C; color:white;"><span class="name">gray-400</span><span class="hex">#8C8C8C</span></div>
    <div class="swatch" style="background: #D9D9D9"><span class="name">gray-200</span><span class="hex">#D9D9D9</span></div>
    <div class="swatch" style="background: #F5F5F5"><span class="name">gray-50</span><span class="hex">#F5F5F5</span></div>
    <div class="swatch" style="background: #FAFAF7"><span class="name">paper</span><span class="hex">#FAFAF7</span></div>
  </div>
</div>
</body></html>
